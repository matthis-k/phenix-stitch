task_id: stitch-dag-generation-strategy-2026-07-01
status: accepted
architecture_contract:
  purpose: "Admit a minimal, typed Stitch DAG generation strategy refactor with clear ownership boundaries."
  canonical_layering:
    sequence:
      - DagGenerationStrategy
      - WorkspaceGraphDraft
      - CanonicalWorkspaceGraph
      - DagValidator
      - DagPlanner
      - ExecutionPlan
      - StepProgram_or_recipes
    ownership:
      DagGenerationStrategy: "Discover graph facts only."
      WorkspaceGraphDraft: "Mutable/mergeable facts from strategies before validation."
      CanonicalWorkspaceGraph: "Validated canonical graph over StableDiGraph with deterministic node-id/index maps."
      DagValidator: "Structural and Phenix topology invariants: unknown nodes, cycles, layers, root rules, role rules, duplicate diagnostics."
      DagPlanner: "Selection, closure, ordering, and projections for consumers."
      ExecutionPlan: "Executable node/step projection consumed by exec/recipes/runners."
      StepProgram_or_recipes: "Execution/update/commit/Tend semantics; no graph fact discovery ownership."
  invariants:
    - id: INV_EDGE_DIRECTION
      rule: "Semantic dependency edges are consumer -> provider."
      verifier_evidence: "Inspect EdgeSpec/WorkspaceEdge creation and planner order tests."
    - id: INV_STRATEGY_FACTS_ONLY
      rule: "Strategies must not execute or plan commits, pushes, nix updates, Tend traversal, or recipe steps."
      verifier_evidence: "Search strategy modules imports/calls for exec/sync execution/tend/git/nix action APIs."
    - id: INV_STABLE_CANONICAL_GRAPH
      rule: "CanonicalWorkspaceGraph uses petgraph::stable_graph::StableDiGraph<NodeSpec, EdgeSpec>."
      verifier_evidence: "Inspect canonical.rs and Cargo.toml/Cargo.lock."
    - id: INV_PLANNER_OWNS_TRAVERSAL
      rule: "Closure and order are centralized in DagPlanner."
      verifier_evidence: "exec.rs, CLI DAG, MCP DAG delegate to planner; any residual compatibility shim is thin and documented."
    - id: INV_EXEC_CONSUMES_PLANS
      rule: "exec.rs owns statuses, step applicability, and run_plan; it consumes planner outputs instead of owning dependency graph/toposort/closure."
      verifier_evidence: "No independent build_dependency_graph/topological_sort/expand_closure remains as active semantic implementation unless justified adapter."
    - id: INV_SYNC_ADAPTER_ONLY
      rule: "sync.rs remains a minimal adapter preserving ActionPlan/Action behavior."
      verifier_evidence: "No full recipe migration or journal/execution rewrite."
    - id: INV_EXACT_INPUT_NAMES
      rule: "nix.updateInputs uses exact flake input names from graph edge metadata."
      verifier_evidence: "Regression test with repo id differing from flake input name."
    - id: INV_MCP_THIN_WRAPPER
      rule: "MCP DAG tool exposes core library graph/planner/render results and does not define graph semantics."
      verifier_evidence: "StitchDagTool delegates to shared API."
    - id: INV_PUBLIC_COMPAT
      rule: "Existing CLI/MCP commands and required JSON fields remain compatible; additive fields only."
      verifier_evidence: "Compatibility tests or golden/assertions for current fields."
    - id: INV_REPO_BOUNDARIES
      rule: "All implementation remains in phenix-stitch; root repo remains orchestration-only."
      verifier_evidence: "Diff paths limited to planned phenix-stitch files plus allowed docs/Cargo.lock."
  accepted_dependency_additions:
    - crate: petgraph
      purpose: "StableDiGraph canonical graph representation."
      constraints: "Normal cargo resolution only; no unrelated dependency churn."
  legacy_compatibility_policy:
    WorkspaceDag: "May remain as public compatibility facade or adapter for graph derive/render/validate callers."
    WorkspaceGraph: "May remain for sync compatibility, preferably backed/constructed from CanonicalWorkspaceGraph."
    removal_policy: "No public removal in this slice without re-approval."
  implementation_boundaries:
    in_scope:
      - "Typed NodeSpec/EdgeSpec and WorkspaceGraphDraft."
      - "FlakeLocksStrategy, GitSubmodulesStrategy membership facts, CompositeDagGenerationStrategy merge/dedup."
      - "CanonicalWorkspaceGraph over StableDiGraph and validation adapter."
      - "DagPlanner closure/order/scope and execution-plan projection."
      - "exec.rs delegation to planner where feasible."
      - "CLI/MCP DAG inspection via shared core APIs."
      - "sync adapter preserving ActionPlan behavior and exact input names."
      - "Focused regression tests and docs/dag-generation-strategy.md."
    out_of_scope:
      - "Full interactive runner."
      - "Full sync-commit recipe migration."
      - "Generic script/plugin strategy."
      - "MCP-owned graph semantics."
      - "Breaking CLI/MCP JSON/command contracts."
      - "Commits, pushes, tracked deletions, secret/permission changes."
  final_architecture_verification_required: true
