status: planned
summary: "Plan typed Stitch DAG generation strategy refactor without editing tracked source files."
classification:
  work_scope:
    class: change
    complexity: c4
    risk: high
    capabilities: {inspect: true, edit: false, agent_state_write: true, delete_untracked: false, delete_tracked: false, run_commands: true, commit: false, push: false, publish: false}
    routing: {workflow: classify_and_dispatch, planner: required, architect: required, worker: after_architect, verifier: required_strict, committer: only_after_explicit_user_request}
    invariants: [no_secret_changes, no_permission_weakening, no_unrelated_changes, no_public_api_change_unless_requested, no_test_or_verification_removal_unless_requested, preserve_repo_boundaries, preserve_declared_flake_outputs]
    boundaries: {max_files_changed: 25, max_lines_changed: 2500}
  selected_pipeline: dag_full_verified
  required_verification_profile: full
  required_dag_scope: affected
preferred_transport:
  tend: mcp_preferred_cli_allowed
  stitch: mcp_preferred_cli_allowed
codebase_memory:
  used: true
  reason: "Broad architecture orientation before file inspection."
  findings:
    - finding: "Existing graph subsystem is concentrated in crates/stitch/src/graph with derive, inventory, lock, render, topo, validate modules."
    - finding: "Exec builds its own dependency maps and ordering in exec.rs; sync still uses legacy WorkspaceGraph from graph/mod.rs."
    - finding: "CLI and MCP DAG inspection currently duplicate ad hoc DAG JSON construction instead of calling a shared planner."
assumptions:
  - id: A1
    assumption: "Adding petgraph for StableDiGraph is acceptable as the minimal implementation of the requested canonical graph."
    consequence_if_wrong: "Architect must require an in-house stable graph wrapper or documented alternative before implementation."
  - id: A2
    assumption: "The public shape of CLI/MCP JSON may be preserved while internal planning changes."
    consequence_if_wrong: "Additional compatibility tests and possibly versioned output docs are required."
  - id: A3
    assumption: "Git-submodule strategy should discover workspace repo presence/gitlink facts, not become a generic graph source of semantic dependency edges beyond configured/submodule membership."
    consequence_if_wrong: "Architecture decision needed for whether submodules define dependency edges."
repo_facts:
  - fact: "No repo-local AGENTS.md, docs/repo-goals.md, docs/architecture, knowledge, or CONTRIBUTING.md were present in phenix-stitch; root AGENTS.md governs."
    source: "Read/glob inspection"
  - fact: "Tend MCP reports one phenix-stitch config with 11 tasks; selected Rust files trigger rustfmt, cargo-check, clippy, cargo-test plus full nix checks under full profile."
    source: "tend-mcp_tend_status and tend-mcp_tend_plan"
  - fact: "Stitch MCP DAG accepted repo name phenix-stitch and reported the workspace topology; path-form repo argument failed as unknown node."
    source: "stitch-mcp_stitch_dag / stitch-mcp_stitch_status"
