lease_recommendations:
  - agent: phenix-architect
    allowed_scope: ["review graph/planner API layering", "approve dependency direction and public compatibility"]
    stop_if: ["architecture ambiguity needs user decision"]
  - agent: phenix-worker
    allowed_scope: ["tracked source/docs/tests within planned_changes only"]
    stop_if: ["scope exceeds 25 files or 2500 LOC", "requires public API break", "requires tracked deletion"]
  - agent: phenix-verifier
    allowed_scope: ["mechanical verification", "plan conformance", "diff inspection"]
    stop_if: ["verification failure not covered by plan"]
implementation_plan:
  - id: PC01
    step: "Introduce typed graph data model and generation trait boundary."
    files:
      - {path: "crates/stitch/src/graph/spec.rs"}
      - {path: "crates/stitch/src/graph/mod.rs"}
      - {path: "crates/stitch/src/lib.rs"}
    change: "Add NodeSpec, EdgeSpec, EdgeKind/metadata, WorkspaceGraphDraft, DagGenerationStrategy, GenerationContext, StrategyError; re-export stable public types."
    reason: "Creates requested clean strategy input layer without embedding planning or execution decisions."
    expected_diff_shape: "New module plus small mod/lib exports; existing WorkspaceDag may remain as compatibility alias/adapter during migration."
  - id: PC02
    step: "Add concrete flake-locks, git-submodules, and composite strategies."
    files:
      - {path: "crates/stitch/src/graph/strategy.rs"}
      - {path: "crates/stitch/src/graph/derive.rs"}
      - {path: "crates/stitch/src/graph/inventory.rs"}
      - {path: "crates/stitch/src/graph/lock.rs"}
    change: "Move lock derivation behind FlakeLocksStrategy, add GitSubmodulesStrategy for membership facts, add CompositeDagGenerationStrategy merge/dedup rules."
    reason: "Separates graph fact discovery from validation and planning."
    expected_diff_shape: "New strategy module; derive_graph_from_locks becomes a thin compatibility wrapper over FlakeLocksStrategy/canonicalization."
  - id: PC03
    step: "Implement canonical graph and validator over StableDiGraph."
    files:
      - {path: "crates/stitch/src/graph/canonical.rs"}
      - {path: "crates/stitch/src/graph/validate.rs"}
      - {path: "crates/stitch/Cargo.toml"}
      - {path: "Cargo.lock"}
    change: "Add CanonicalWorkspaceGraph backed by petgraph::stable_graph::StableDiGraph<NodeSpec, EdgeSpec>, deterministic node-id index maps, canonicalization errors, and DagValidator entrypoint that preserves current diagnostics."
    reason: "Provides one validated graph representation for planner/entrypoints."
    expected_diff_shape: "New canonical module, petgraph dependency, validate_graph adapter retained for old WorkspaceDag callers."
  - id: PC04
    step: "Add DagPlanner for closure/order/scope and StepProgram projection."
    files:
      - {path: "crates/stitch/src/graph/planner.rs"}
      - {path: "crates/stitch/src/graph/topo.rs"}
      - {path: "crates/stitch/src/exec.rs"}
    change: "Centralize selection, upstream/downstream/connected/all closure, providers-first/consumers-first/stable order, and conversion to ExecutionPlan/ExecutionNode."
    reason: "Planner owns traversal and ordering; exec only resolves statuses/steps and runs plans."
    expected_diff_shape: "New planner module; exec build_dependency_graph/topological_sort/expand_closure collapse into calls/adapters."
  - id: PC05
    step: "Route CLI and MCP DAG inspection through canonical planner."
    files:
      - {path: "crates/stitch-cli/src/main.rs"}
      - {path: "crates/stitch-mcp/src/tools.rs"}
      - {path: "crates/stitch/src/graph/render.rs"}
    change: "Make graph derive/verify/order and stitch.dag use shared strategy/canonical/planner APIs; preserve output fields and existing command names."
    reason: "Removes duplicated DAG semantics and prevents MCP from defining graph semantics."
    expected_diff_shape: "Entrypoint functions become thinner; output serialization may use helper structs from planner/render."
  - id: PC06
    step: "Preserve sync through adapter and exact input names."
    files:
      - {path: "crates/stitch/src/sync.rs"}
      - {path: "crates/stitch/src/graph/planner.rs"}
      - {path: "crates/stitch/src/graph/canonical.rs"}
    change: "Add adapter from CanonicalWorkspaceGraph to legacy WorkspaceGraph or update plan_commit to read canonical edges while keeping ActionPlan/Action behavior. Ensure InputUpdate.input_name comes from EdgeSpec input_name, not repo name heuristics."
    reason: "Meets non-goal by avoiding full sync recipe migration while correcting input update precision."
    expected_diff_shape: "Small sync.rs adapter changes; no runner rewrite."
  - id: PC07
    step: "Add regression tests and architecture docs."
    files:
      - {path: "crates/stitch/src/graph/**"}
      - {path: "crates/stitch/src/exec.rs"}
      - {path: "crates/stitch/src/sync.rs"}
      - {path: "crates/stitch-mcp/src/tools.rs"}
      - {path: "crates/stitch-cli/src/main.rs"}
      - {path: "docs/dag-generation-strategy.md"}
    change: "Test strategy merge/dedup, canonical validation, provider-before-consumer planning, closure semantics, CLI/MCP DAG parity, and exact nix input names; document layering and non-goals."
    reason: "Protects architecture contract and observable behavior."
    expected_diff_shape: "Focused unit tests near modules plus one concise doc."
