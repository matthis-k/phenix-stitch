    allowed_operations: [create, modify]
    expected_behavior_change: "No runtime behavior beyond documented, tested architecture contracts."
    expected_test_or_doc_change: "New architecture doc and focused regression tests."
    forbidden_expansions: [{expansion: "Removing or weakening existing tests/verification tasks"}]
architecture_intent:
  requires_architect_review: true
  intended_patterns:
    - pattern: "DagGenerationStrategy -> WorkspaceGraphDraft -> CanonicalWorkspaceGraph -> DagValidator -> DagPlanner -> ExecutionPlan/StepProgram/recipes"
      rationale: "Each layer has one responsibility: discover facts, normalize, validate, plan traversal, execute actions."
    - pattern: "StableDiGraph as canonical internal graph with deterministic id/index maps"
      rationale: "Allows stable node references while preserving deterministic agent-facing output."
  dependency_direction:
    - {from: "strategies", to: "draft/canonical graph types", allowed: true, reason: "Strategies emit facts only."}
    - {from: "planner", to: "canonical graph", allowed: true, reason: "Planner computes closure/order from validated graph."}
    - {from: "exec/recipes/sync", to: "planner", allowed: true, reason: "Execution consumes plans, not graph internals."}
    - {from: "graph generation", to: "exec/sync/tend actions", allowed: false, reason: "Generation must not decide execution or verification traversal."}
    - {from: "MCP", to: "graph semantics ownership", allowed: false, reason: "MCP only exposes library semantics."}
  module_boundaries:
    - boundary: "crates/stitch/src/graph"
      intended_rule: "Owns graph specs, generation strategies, canonicalization, validation, rendering, planning."
    - boundary: "crates/stitch/src/exec.rs"
      intended_rule: "Owns step applicability and running ExecutionPlan; delegates traversal/order to DagPlanner."
    - boundary: "crates/stitch/src/sync.rs"
      intended_rule: "May adapt canonical graph to existing ActionPlan; no broad recipe migration."
  public_api_changes:
    allowed:
      - {change: "Additive exported graph/planner types and helper functions."}
      - {change: "Additive JSON fields if needed for exact input names, preserving existing fields."}
    forbidden:
      - {change: "Removing current CLI/MCP commands or required JSON fields without user approval."}
      - {change: "Changing consumer -> provider edge direction."}
  test_strategy:
    - strategy: "Unit-test each layer: strategy output, canonicalization, validation, planner closure/order, adapter behavior."
    - strategy: "Regression-test exact nix input names where input name differs from dependency node id."
    - strategy: "Keep tests semantic; do not assert incidental file layout beyond public module boundaries."
  docs_config_expectations:
    - expectation: "Add docs/dag-generation-strategy.md explaining layer ownership, edge direction, strategies, non-goals, and sync adapter."
    - expectation: "If Cargo.toml gains petgraph, Cargo.lock must be updated by normal cargo resolution."
  forbidden_architecture_drift:
    - {drift: "Duplicate closure/topological-sort logic remains in exec, CLI, or MCP after planner integration."}
    - {drift: "Strategies call git commit/push, nix update, tend, or runner APIs."}
    - {drift: "Git-submodules strategy becomes authoritative source of dependency semantics."}
verification_plan:
  dag:
    normalize:
      logical_executor: tend
      transport: mcp
      scope: affected
      order: dag
      mutates: true
    branches:
      - id: lint_format
        logical_executor: tend
        transport: mcp
        tend_profile: full
        scope: affected
        mutates: false
      - id: unit_tests
        logical_executor: tend
        transport: mcp
        tend_profile: full
        scope: affected
        mutates: false
      - id: flake_check
        logical_executor: tend
        transport: mcp
        tend_profile: full
        scope: affected
        mutates: false
      - id: build
        logical_executor: tend
        transport: mcp
        tend_profile: full
        scope: affected
        mutates: false
    aggregate:
      required: true
  operations:
    - id: tend-status
      logical_executor: tend
      transport_preference: mcp_first_cli_allowed
      command_or_mcp_tool: "tend-mcp_tend_status(root=phenix-stitch)"
      purpose: "Confirm verification contract."
    - id: tend-plan-full
      logical_executor: tend
      transport_preference: mcp_first_cli_allowed
      command_or_mcp_tool: "tend-mcp_tend_plan(mode=selected, phase=verify, files=planned Rust/Cargo/docs files)"
      purpose: "Confirm checks selected before implementation and after diff exists."
    - id: tend-fix
      logical_executor: tend
      transport_preference: mcp_first_cli_allowed
      command_or_mcp_tool: "tend-mcp_tend_run(apply=true, phase=fix, mode=changed or selected)"
      purpose: "Normalize formatting only after implementation."
    - id: tend-verify-full
      logical_executor: tend
      transport_preference: mcp_first_cli_allowed
      command_or_mcp_tool: "tend-mcp_tend_run(apply=true, phase=verify, mode=changed, output=full, timeout_seconds>=1200)"
      purpose: "Run full repo verification because public graph/planner semantics and dependency topology are affected."
    - id: stitch-dag-evidence
      logical_executor: stitch
      transport_preference: mcp_first_cli_allowed
      command_or_mcp_tool: "stitch-mcp_stitch_dag(mode=full, repos=[phenix-stitch], json=true)"
      purpose: "Record DAG/topology evidence; use repo name not absolute path."
  architecture_questions:
    - question: "Should petgraph be accepted as the StableDiGraph provider?"
      expected_answer: "Yes, unless architect identifies a repository policy against new dependencies."
    - question: "Should existing WorkspaceDag/WorkspaceGraph stay as compatibility facades for this change?"
      expected_answer: "Yes, to avoid broad public API and sync rewrites."
    - question: "What dependency semantics, if any, may GitSubmodulesStrategy infer?"
      expected_answer: "Submodule membership/path facts only; flake locks/topology define dependency edges."
risk_register:
  - risk: "Public CLI/MCP output breaks downstream agents."
    mitigation: "Preserve existing fields/commands and add compatibility tests."
  - risk: "Two graph models drift during migration."
    mitigation: "Make old APIs thin adapters over canonical graph or test parity."
  - risk: "nix.updateInputs updates wrong lock input when input name differs from repo id."
    mitigation: "Carry input_name in EdgeSpec and add mismatched-name regression tests."
  - risk: "Refactor exceeds file/LOC boundary."
    mitigation: "Stop and replan; keep sync and recipes as adapters."
handoff_to_architect:
  questions:
    - question: "Approve the layer boundary and petgraph StableDiGraph dependency?"
    - question: "Approve preserving legacy graph structs as compatibility adapters for this c4 slice?"
    - question: "Confirm git-submodules strategy should not create semantic dependency edges except explicit metadata/config links."
