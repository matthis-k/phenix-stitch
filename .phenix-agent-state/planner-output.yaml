task_packet:
  task_id: stitch-dag-generation-strategy-2026-07-01
  scope:
    in_scope:
      - {item: "crates/stitch/src/graph/** strategy/draft/canonical/validator/planner refactor"}
      - {item: "crates/stitch/src/exec.rs planner integration"}
      - {item: "crates/stitch/src/sync.rs adapter/minimal compatibility only"}
      - {item: "crates/stitch-cli/src/main.rs and crates/stitch-mcp/src/tools.rs DAG inspection routing"}
