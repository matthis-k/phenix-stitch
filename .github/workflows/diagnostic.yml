name: Branch diagnostics

on:
  push:
    branches: [qa/align-cli-mcp]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics

          cargo fmt --all --check >diagnostics/rustfmt.log 2>&1
          echo $? >diagnostics/rustfmt.exit

          cargo check --workspace --all-targets >diagnostics/check.log 2>&1
          echo $? >diagnostics/check.exit

          cargo clippy --workspace --all-targets -- -D warnings >diagnostics/clippy.log 2>&1
          echo $? >diagnostics/clippy.exit

          cargo test --workspace >diagnostics/test.log 2>&1
          echo $? >diagnostics/test.exit

          cargo fmt --all
          git diff -- . ':(exclude).github/workflows/diagnostic.yml' >diagnostics/rustfmt.diff

          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: branch-diagnostics
          path: diagnostics
          if-no-files-found: error
