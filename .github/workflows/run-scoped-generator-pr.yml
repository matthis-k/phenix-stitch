name: Publish scoped Stitch tree

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'refactor/scoped-stitch-maintenance'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refactor/scoped-stitch-maintenance
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Generate and publish validated implementation
        shell: bash
        run: |
          set -euo pipefail
          : > publication.log

          sed -n '/^        run: |$/,$p' .github/workflows/prepare-scoped-stitch-pr.yml \
            | tail -n +2 \
            | sed 's/^          //' > /tmp/generate.sh
          sed -i '/^nix profile add nixpkgs#devenv$/,$d' /tmp/generate.sh
          bash /tmp/generate.sh >> publication.log 2>&1

          python3 - <<'PY'
          from pathlib import Path

          lib = Path("crates/stitch/src/lib.rs")
          lib.write_text(lib.read_text().replace("pub mod validate;\n", ""))

          Path("crates/stitch/src/model.rs").write_text(r'''use std::path::{Path, PathBuf};

          use serde::{Deserialize, Serialize};

          #[derive(Debug, Clone, Serialize, Deserialize)]
          #[serde(deny_unknown_fields)]
          pub struct WorkspaceConfig {
              pub workspace: String,
              pub repos: Vec<RepoConfig>,
              #[serde(skip)]
              pub config_dir: Option<PathBuf>,
          }

          #[derive(Debug, Clone, Serialize, Deserialize)]
          pub struct RepoConfig {
              pub name: String,
              pub path: String,
              #[serde(default, skip_serializing_if = "Option::is_none")]
              pub remote: Option<String>,
          }

          impl RepoConfig {
              pub fn resolved_path(&self, workspace: &WorkspaceConfig) -> PathBuf {
                  let path = Path::new(&self.path);
                  if path.is_absolute() {
                      path.to_path_buf()
                  } else if let Some(config_dir) = &workspace.config_dir {
                      config_dir.join(path)
                  } else {
                      std::env::current_dir().unwrap_or_default().join(path)
                  }
              }
          }

          #[derive(Debug, Clone, Serialize, Deserialize, PartialEq)]
          pub enum RepoAvailability {
              #[serde(rename = "present")]
              Present,
              #[serde(rename = "missing")]
              Missing,
              #[serde(rename = "not_git_repo")]
              NotGitRepo,
          }

          #[derive(Debug, Clone, Serialize, Deserialize)]
          pub struct RepoStatus {
              pub name: String,
              pub path: String,
              pub branch: String,
              pub is_dirty: bool,
              pub status: RepoAvailability,
              pub staged_count: usize,
              pub unstaged_count: usize,
              pub untracked_count: usize,
              #[serde(skip_serializing_if = "Option::is_none")]
              pub ahead: Option<usize>,
              #[serde(skip_serializing_if = "Option::is_none")]
              pub behind: Option<usize>,
          }
          ''')

          Path("crates/stitch/src/status.rs").write_text(r'''use crate::git;
          use crate::model::{RepoAvailability, RepoStatus, WorkspaceConfig};

          pub fn collect_all(config: &WorkspaceConfig) -> Result<Vec<RepoStatus>, String> {
              let mut statuses = Vec::new();
              for repository in &config.repos {
                  let path = repository.resolved_path(config);
                  if !path.exists() {
                      statuses.push(RepoStatus {
                          name: repository.name.clone(),
                          path: repository.path.clone(),
                          branch: String::new(),
                          is_dirty: false,
                          status: RepoAvailability::Missing,
                          staged_count: 0,
                          unstaged_count: 0,
                          untracked_count: 0,
                          ahead: None,
                          behind: None,
                      });
                      continue;
                  }
                  if !path.join(".git").exists() {
                      statuses.push(RepoStatus {
                          name: repository.name.clone(),
                          path: repository.path.clone(),
                          branch: String::new(),
                          is_dirty: false,
                          status: RepoAvailability::NotGitRepo,
                          staged_count: 0,
                          unstaged_count: 0,
                          untracked_count: 0,
                          ahead: None,
                          behind: None,
                      });
                      continue;
                  }
                  statuses.push(git::get_status(&repository.name, &path)?);
              }
              Ok(statuses)
          }
          ''')

          render = Path("crates/stitch/src/graph/render.rs")
          text = render.read_text().replace("use crate::model::WorkspaceConfig;\n", "")
          start = text.index("pub fn operation_dag_json(")
          end = text.index("fn render_graph_text(", start)
          render.write_text(text[:start] + text[end:])

          cli = Path("crates/stitch-cli/src/main.rs")
          cli.write_text(
              cli.read_text().replace(
                  "ExecutionMode, ExecutionScope, OrderMode, RunOptions, SelectionMode,",
                  "ExecutionMode, ExecutionScope, RunOptions, SelectionMode,",
              )
          )

          mcp = Path("crates/stitch-mcp/src/tools.rs")
          mcp.write_text(
              mcp.read_text().replace(
                  "use stitch::exec::{ExecutionScope, SelectionMode};",
                  "use stitch::exec::ExecutionScope;",
              )
          )
          PY

          rm -rf crates/stitch/src/changeset
          rm -f \
            crates/stitch/src/validate.rs \
            crates/stitch/src/time.rs \
            docs/tend-boundary.md \
            docs/dag-generation-strategy.md \
            tend-shell.nix \
            .github/workflows/prepare-scoped-stitch-pr.yml \
            .github/workflows/refine-stitch-scope.yml \
            .github/workflows/run-scoped-generator-pr.yml \
            .github/workflows/run-maintenance.yml \
            .github/workflows/repair-refine-workflow.yml \
            .maintenance-failure.log

          nix profile add nixpkgs#devenv >> publication.log 2>&1
          devenv tasks run maintenance:fix >> publication.log 2>&1
          nix flake lock >> publication.log 2>&1

          audit_status=0
          if git grep -niE '(^|[^[:alnum:]_-])tend([^[:alnum:]_-]|$)' >> publication.log 2>&1; then
            audit_status=1
          fi
          if git grep -niE 'workloop|changeset|recipe|hooks install|sync --' >> publication.log 2>&1; then
            audit_status=1
          fi
          if (( audit_status != 0 )); then
            tail -n 300 publication.log
            exit 1
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git status --short >> publication.log
          git commit -m "refactor: scope Stitch to ordered repository execution" >> publication.log 2>&1
          git push origin HEAD:refactor/scoped-stitch-maintenance >> publication.log 2>&1
          tail -n 300 publication.log
      - name: Upload publication diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scoped-stitch-publication-log
          path: publication.log
          if-no-files-found: warn
