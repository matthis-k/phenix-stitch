name: Run scoped Stitch generator

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    if: github.event.pull_request.head.ref == 'refactor/scoped-stitch-maintenance'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refactor/scoped-stitch-maintenance
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Generate, narrow, and validate Stitch
        shell: bash
        run: |
          set -euo pipefail

          sed -n '/^        run: |$/,$p' .github/workflows/prepare-scoped-stitch-pr.yml \
            | tail -n +2 \
            | sed 's/^          //' > /tmp/generate.sh
          sed -i '/^nix profile add nixpkgs#devenv$/,$d' /tmp/generate.sh
          bash /tmp/generate.sh

          python3 - <<'PY'
          from pathlib import Path

          lib = Path("crates/stitch/src/lib.rs")
          lib.write_text(lib.read_text().replace("pub mod validate;\n", ""))

          Path("crates/stitch/src/model.rs").write_text(r'''use std::path::{Path, PathBuf};

          use serde::{Deserialize, Serialize};

          #[derive(Debug, Clone, Serialize, Deserialize)]
          #[serde(deny_unknown_fields)]
          pub struct WorkspaceConfig {
              pub workspace: String,
              pub repos: Vec<RepoConfig>,
              #[serde(skip)]
              pub config_dir: Option<PathBuf>,
          }

          #[derive(Debug, Clone, Serialize, Deserialize)]
          pub struct RepoConfig {
              pub name: String,
              pub path: String,
              #[serde(default, skip_serializing_if = "Option::is_none")]
              pub remote: Option<String>,
          }

          impl RepoConfig {
              pub fn resolved_path(&self, workspace: &WorkspaceConfig) -> PathBuf {
                  let path = Path::new(&self.path);
                  if path.is_absolute() {
                      path.to_path_buf()
                  } else if let Some(config_dir) = &workspace.config_dir {
                      config_dir.join(path)
                  } else {
                      std::env::current_dir().unwrap_or_default().join(path)
                  }
              }
          }

          #[derive(Debug, Clone, Serialize, Deserialize, PartialEq)]
          pub enum RepoAvailability {
              #[serde(rename = "present")]
              Present,
              #[serde(rename = "missing")]
              Missing,
              #[serde(rename = "not_git_repo")]
              NotGitRepo,
          }

          #[derive(Debug, Clone, Serialize, Deserialize)]
          pub struct RepoStatus {
              pub name: String,
              pub path: String,
              pub branch: String,
              pub is_dirty: bool,
              pub status: RepoAvailability,
              pub staged_count: usize,
              pub unstaged_count: usize,
              pub untracked_count: usize,
              #[serde(skip_serializing_if = "Option::is_none")]
              pub ahead: Option<usize>,
              #[serde(skip_serializing_if = "Option::is_none")]
              pub behind: Option<usize>,
          }
          ''')

          cli = Path("crates/stitch-cli/src/main.rs")
          cli.write_text(
              cli.read_text().replace(
                  "ExecutionMode, ExecutionScope, OrderMode, RunOptions, SelectionMode,",
                  "ExecutionMode, ExecutionScope, RunOptions, SelectionMode,",
              )
          )

          mcp = Path("crates/stitch-mcp/src/tools.rs")
          mcp.write_text(
              mcp.read_text().replace(
                  "use stitch::exec::{ExecutionScope, SelectionMode};",
                  "use stitch::exec::ExecutionScope;",
              )
          )
          PY

          rm -f \
            .github/workflows/prepare-scoped-stitch-pr.yml \
            .github/workflows/refine-stitch-scope.yml \
            .github/workflows/run-scoped-generator-pr.yml \
            .github/workflows/run-maintenance.yml \
            .github/workflows/repair-refine-workflow.yml \
            .maintenance-failure.log

          nix profile add nixpkgs#devenv
          set +e
          devenv tasks run maintenance:fix > generator.log 2>&1
          fix_status=$?
          if (( fix_status == 0 )); then
            nix flake lock >> generator.log 2>&1
            lock_status=$?
          else
            lock_status=1
          fi
          if (( fix_status == 0 && lock_status == 0 )); then
            devenv test >> generator.log 2>&1
            test_status=$?
          else
            test_status=1
          fi
          set -e
          tail -n 500 generator.log
          if (( fix_status != 0 || lock_status != 0 || test_status != 0 )); then
            exit 1
          fi

          needle="$(printf 'te%s' 'nd')"
          ! git grep -ni "$needle"
          ! git grep -n -E 'workloop|changeset|recipe|hooks install|sync --'

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: scope Stitch to ordered repository execution"
          git push origin HEAD:refactor/scoped-stitch-maintenance
      - name: Upload generator diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scoped-stitch-generator-log
          path: generator.log
          if-no-files-found: warn
