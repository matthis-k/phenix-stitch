name: Finalize Phenix identity

on:
  push:
    branches:
      - rename/phenix-identity

permissions:
  contents: write

jobs:
  rename:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: rename/phenix-identity
      - name: Remove legacy fixture name
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/stitch/src/workspace.rs')
          text = path.read_text().replace(
              'assert!(!glob_matches("phenix-*", "newxos"));',
              'assert!(!glob_matches("phenix-*", "other-product"));',
          )
          path.write_text(text)
          PY
      - name: Commit rename
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test: remove legacy product fixture"
          git push origin HEAD:rename/phenix-identity
