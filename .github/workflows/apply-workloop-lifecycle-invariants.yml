name: Apply workloop lifecycle invariants

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply lifecycle patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/apply_workloop_lifecycle_invariants.py')
          text = path.read_text()
          text = text.replace(
              '    if count != 1:\n        raise RuntimeError(f"{label}: expected one match, found {count}")\n    return text.replace(old, new, 1)',
              '    if count < 1:\n        raise RuntimeError(f"{label}: expected a match")\n    return text.replace(old, new, 1)',
              1,
          )
          path.write_text(text)
          PY
          set +e
          python3 .github/scripts/apply_workloop_lifecycle_invariants.py > patch-debug.log 2>&1
          status=$?
          cat patch-debug.log
          if [[ $status -ne 0 ]]; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add patch-debug.log
            git commit -m "chore: capture lifecycle patch failure"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
            exit $status
          fi
          rm -f patch-debug.log
      - name: Format
        run: cargo fmt --all
      - name: Test workspace
        shell: bash
        run: |
          set +e
          cargo test --workspace > cargo-test-debug.log 2>&1
          status=$?
          cat cargo-test-debug.log
          if [[ $status -ne 0 ]]; then
            git restore crates/stitch/src/workloop.rs crates/stitch-cli/src/main.rs
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add cargo-test-debug.log
            git commit -m "chore: capture lifecycle test failure"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
            exit $status
          fi
          rm -f cargo-test-debug.log
      - name: Commit applied patch
        run: |
          rm -f .github/scripts/apply_workloop_lifecycle_invariants.py
          rm -f .github/workflows/apply-workloop-lifecycle-invariants.yml
          rm -f patch-debug.log cargo-test-debug.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: enforce workloop lifecycle invariants"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
