name: Apply Stitch QA MCP Roots

on:
  push:
    branches:
      - qa/mcp-root-enforcement

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Apply MCP root enforcement patch
        run: python3 .github/scripts/apply-stitch-qa-roots.py

      - name: Remove temporary patch machinery
        run: rm .github/scripts/apply-stitch-qa-roots.py .github/workflows/apply-stitch-qa-roots.yml

      - name: Format Rust
        run: cargo fmt --all

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Commit applied changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: enforce MCP roots for repository paths"
          git push origin HEAD:qa/mcp-root-enforcement
