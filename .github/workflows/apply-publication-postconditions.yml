name: Apply publication postconditions

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply source patch
        run: |
          curl --fail --silent --show-error --location \
            https://raw.githubusercontent.com/matthis-k/phenix-stitch/401b7acf2696a558b4a21580af8585c9ad4cef51/.github/scripts/apply_publication_postconditions.py \
            --output /tmp/apply-publication-postconditions.py
          python3 /tmp/apply-publication-postconditions.py
      - name: Format
        run: cargo fmt --all
      - name: Test workspace
        run: cargo test --workspace
      - name: Commit source changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/stitch/src/workloop.rs crates/stitch-cli/src/main.rs
          git commit -m "fix: verify publication postconditions"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
