name: Repair Cargo Lock

on:
  pull_request:
  push:
    branches:
      - refactor/explicit-tend-boundary

permissions:
  contents: write

concurrency:
  group: repair-cargo-lock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: refactor/explicit-tend-boundary

      - name: Regenerate dependency lock
        shell: bash
        run: |
          set -euo pipefail
          rm Cargo.lock
          cargo generate-lockfile
          cargo metadata --locked --format-version 1 --no-deps > /dev/null
          git diff --check

      - name: Commit dependency lock repair
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/cargo-lock.gz.b64.*
          rm .github/workflows/repair-cargo-lock.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'build(cargo): regenerate lock for process-only Tend boundary'
          git push origin HEAD:refactor/explicit-tend-boundary
