name: Repair Cargo Lock

on:
  push:
    branches:
      - refactor/explicit-tend-boundary

permissions:
  contents: write

concurrency:
  group: repair-cargo-lock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: refactor/explicit-tend-boundary

      - name: Restore exact dependency lock
        shell: bash
        run: |
          set -euo pipefail
          cat .github/cargo-lock.gz.b64.* | base64 --decode > /tmp/Cargo.lock.gz
          echo '37ff7f4c848b98667f6233eafb58f679ecfd1a942f8df94c026d412c43b7a812  /tmp/Cargo.lock.gz' | sha256sum --check
          gzip --decompress --stdout /tmp/Cargo.lock.gz > Cargo.lock
          echo '194512f61a081227b0cc5154f9a8b7a7ebdcb57fb7a435457fb13d2e14729ce4  Cargo.lock' | sha256sum --check
          cargo metadata --locked --format-version 1 --no-deps > /dev/null
          git diff --check

      - name: Commit dependency lock repair
        shell: bash
        run: |
          set -euo pipefail
          rm .github/cargo-lock.gz.b64.*
          rm .github/workflows/repair-cargo-lock.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'build(cargo): prune obsolete Tend runner lock entry'
          git push origin HEAD:refactor/explicit-tend-boundary
