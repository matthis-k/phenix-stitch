name: Internalize MCP Core

on:
  pull_request:
  push:
    branches:
      - refactor/explicit-tend-boundary

permissions:
  contents: write

concurrency:
  group: internalize-mcp-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: refactor/explicit-tend-boundary

      - name: Internalize MCP runtime core
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet https://github.com/matthis-k/phenix-tend /tmp/phenix-tend
          git -C /tmp/phenix-tend checkout --quiet 9b16fda280d93943ca550d5072d6c2fa7afb189f
          cp -r /tmp/phenix-tend/crates/phenix-mcp-core crates/phenix-mcp-core

          python - <<'PY'
          from pathlib import Path

          workspace = Path("Cargo.toml")
          text = workspace.read_text()
          text = text.replace(
              'members = [\n  "crates/stitch",',
              'members = [\n  "crates/phenix-mcp-core",\n  "crates/stitch",',
              1,
          )
          workspace.write_text(text)

          manifest = Path("crates/stitch-mcp/Cargo.toml")
          text = manifest.read_text().replace(
              'phenix-mcp-core = { git = "https://github.com/matthis-k/phenix-tend" }',
              'phenix-mcp-core = { path = "../phenix-mcp-core" }',
              1,
          )
          manifest.write_text(text)

          package = Path("modules/package.nix")
          text = package.read_text().replace(
              '''      cargoLock = {
                lockFile = ../Cargo.lock;
                outputHashes = {
                  "phenix-mcp-core-0.1.0" = "sha256-6XxX63SIZ8RgQRCvhHx1M5p1wkUAnCsDJawljTCRXIo=";
                };
              };''',
              '''      cargoLock.lockFile = ../Cargo.lock;''',
              1,
          )
          package.write_text(text)
          PY

          rm Cargo.lock
          cargo generate-lockfile
          cargo metadata --locked --format-version 1 --no-deps > /dev/null
          cargo fmt --all
          git diff --check

      - name: Commit MCP boundary repair
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/cargo-lock.gz.b64.*
          rm .github/workflows/repair-cargo-lock.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor(mcp): internalize the shared runtime core'
          git push origin HEAD:refactor/explicit-tend-boundary
