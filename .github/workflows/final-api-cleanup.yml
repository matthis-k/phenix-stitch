name: Final API cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/current-api-only
          fetch-depth: 0
      - name: Apply final source cleanup
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          model = Path('crates/stitch/src/model.rs')
          text = model.read_text().replace(
              'r#"{\\"version\\":1,\\"workspace\\":\\"test\\",\\"repos\\":[]}"#',
              'r#"{"version":1,"workspace":"test","repos":[]}"#',
          )
          model.write_text(text)

          canonical = Path('crates/stitch/src/graph/canonical.rs')
          text = canonical.read_text()
          text = re.sub(
              r'\n    pub\(crate\) fn to_sync_graph\(.*?\n    \}\n\n    pub fn flake_input_names_for_direct_dependencies',
              '\n    pub fn flake_input_names_for_direct_dependencies',
              text,
              flags=re.DOTALL,
          )
          canonical.write_text(text)
          PY
      - name: Validate and capture diagnostics
        id: validate
        shell: bash
        run: |
          set +e
          : > final-api-cleanup.log
          cargo fmt --all >> final-api-cleanup.log 2>&1
          fmt_apply=$?
          cargo fmt --all -- --check >> final-api-cleanup.log 2>&1
          fmt_check=$?
          cargo check --workspace --all-targets >> final-api-cleanup.log 2>&1
          check=$?
          cargo clippy --workspace --all-targets -- -D warnings >> final-api-cleanup.log 2>&1
          clippy=$?
          cargo test --workspace >> final-api-cleanup.log 2>&1
          test=$?
          status=$((fmt_apply || fmt_check || check || clippy || test))
          printf '\nfmt_apply=%s fmt_check=%s check=%s clippy=%s test=%s\n' \
            "$fmt_apply" "$fmt_check" "$check" "$clippy" "$test" >> final-api-cleanup.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit source and diagnostics
        run: |
          if [[ '${{ steps.validate.outputs.status }}' == '0' ]]; then
            rm -f final-api-cleanup.log
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'refactor: remove final stale API adapter'
            git push origin HEAD:cleanup/current-api-only
          fi
      - name: Report failure
        if: steps.validate.outputs.status != '0'
        run: |
          cat final-api-cleanup.log
          exit 1
