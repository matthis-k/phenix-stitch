name: API cleanup agent

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/current-api-only
          fetch-depth: 0
      - name: Apply cleanup
        run: python3 tools/api_cleanup.py
      - name: Validate cleanup
        run: |
          cargo fmt --all -- --check
          cargo check --workspace --all-targets
          cargo test --workspace
      - name: Commit generated cleanup
        shell: bash
        run: |
          rm -f api-cleanup-check.log api-cleanup-inventory.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'refactor: remove versioned Stitch data contracts'
            git push origin HEAD:cleanup/current-api-only
          fi
