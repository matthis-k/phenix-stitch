name: API cleanup agent

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/current-api-only
          fetch-depth: 0
      - name: Finalize and validate cleanup
        id: validate
        shell: bash
        run: |
          set +e
          python3 tools/graph_cleanup_fix.py > api-cleanup-check.log 2>&1
          fix_status=$?
          cargo fmt --all >> api-cleanup-check.log 2>&1
          fmt_apply_status=$?
          cargo fmt --all -- --check >> api-cleanup-check.log 2>&1
          fmt_status=$?
          cargo check --workspace --all-targets >> api-cleanup-check.log 2>&1
          check_status=$?
          cargo test --workspace >> api-cleanup-check.log 2>&1
          test_status=$?
          status=$((fix_status || fmt_apply_status || fmt_status || check_status || test_status))
          printf '\nfix=%s fmt_apply=%s fmt=%s check=%s test=%s\n' \
            "$fix_status" "$fmt_apply_status" "$fmt_status" "$check_status" "$test_status" >> api-cleanup-check.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit finalized source and diagnostics
        shell: bash
        run: |
          rm -f api-cleanup-inventory.txt api-legacy-inventory.txt
          if [[ '${{ steps.validate.outputs.status }}' == '0' ]]; then
            rm -f api-cleanup-check.log
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'refactor: finalize current-only Stitch API'
            git push origin HEAD:cleanup/current-api-only
          fi
      - name: Report validation result
        if: steps.validate.outputs.status != '0'
        run: |
          cat api-cleanup-check.log
          exit 1
