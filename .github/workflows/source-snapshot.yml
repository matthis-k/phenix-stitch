name: Apply Tend Boundary

on:
  push:
    branches:
      - refactor/explicit-tend-boundary

permissions:
  contents: write

concurrency:
  group: apply-tend-boundary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: refactor/explicit-tend-boundary

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply verified boundary patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/pr3.patch.gz.b64.* | base64 --decode > /tmp/pr3.patch.gz
          echo 'd29c969e580f19e7246d6b2912d3fbc76cb096d7111a32dca56bd53facbdf49c  /tmp/pr3.patch.gz' | sha256sum --check
          gzip --decompress --stdout /tmp/pr3.patch.gz > /tmp/pr3.patch
          echo 'e8e637052cb57cd38b0b41c0d5713b0c9822b2eb434deedb20ebb42806c65a18  /tmp/pr3.patch' | sha256sum --check
          git apply --check /tmp/pr3.patch
          git apply /tmp/pr3.patch

      - name: Regenerate declarative locks and formatting
        shell: bash
        run: |
          set -euo pipefail
          cargo metadata --format-version 1 --no-deps > /dev/null
          cargo fmt --all
          nix flake lock
          git diff --check

      - name: Commit boundary implementation
        shell: bash
        run: |
          set -euo pipefail
          rm .github/pr3.patch.gz.b64.*
          rm .github/workflows/source-snapshot.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor(tend): enforce explicit CLI execution boundary'
          git push origin HEAD:refactor/explicit-tend-boundary
