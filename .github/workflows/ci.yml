name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Nix flake checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply repository formatting
        id: format
        shell: bash
        run: |
          set +e
          (
            set -euxo pipefail
            nix develop --command cargo fmt --all
            if ! git diff --quiet; then
              git config user.name 'github-actions[bot]'
              git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
              git add -- '*.rs'
              git commit -m 'style: apply rustfmt to discovered workspace graph'
              git push origin HEAD:refactor/discovered-workspace-graph
            fi
          ) > format.log 2>&1
          status=$?
          cat format.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload formatting diagnostics
        if: steps.format.outputs.status != '0'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: stitch-format-diagnostics
          path: format.log
          if-no-files-found: error

      - name: Stop after formatting failure
        if: steps.format.outputs.status != '0'
        run: exit 1

      - name: Run deterministic checks
        id: checks
        shell: bash
        run: |
          set +e
          nix flake check --print-build-logs > ci.log 2>&1
          status=$?
          cat ci.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload failure diagnostics
        if: steps.checks.outputs.status != '0'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: stitch-ci-diagnostics
          path: ci.log
          if-no-files-found: error

      - name: Fail when checks fail
        if: steps.checks.outputs.status != '0'
        run: exit 1
