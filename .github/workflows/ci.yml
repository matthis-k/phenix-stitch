name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock:
    name: Commit latest Tend lock
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out PR branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update and commit Tend lock
        shell: bash
        run: |
          set -euo pipefail
          nix --accept-flake-config flake update phenix-tend
          if git diff --quiet -- flake.lock; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock
          git commit -m "chore: update phenix-tend lock"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
