name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reconcile:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'refactor/scoped-stitch-maintenance'
    name: Reconcile current main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refactor/scoped-stitch-maintenance
          fetch-depth: 0
      - name: Preserve scoped tree while recording main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git merge -s ours --no-edit origin/main
          git push origin HEAD:refactor/scoped-stitch-maintenance

  checks:
    name: Final maintenance checks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: devenv
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Run repository maintenance
        run: devenv test
      - name: Enforce scoped surface
        shell: bash
        run: |
          set -euo pipefail
          ! git grep -niE '(^|[^[:alnum:]_-])tend([^[:alnum:]_-]|$)'
          ! git grep -niE 'workloop|changeset|recipe|hooks install|sync --'
