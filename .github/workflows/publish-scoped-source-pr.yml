name: Publish scoped Stitch source

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'refactor/scoped-stitch-maintenance'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refactor/scoped-stitch-maintenance
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Publish source and configuration changes
        shell: bash
        run: |
          set -euo pipefail

          sed -n '/^        run: |$/,$p' .github/workflows/run-scoped-generator-pr.yml \
            | tail -n +2 \
            | sed 's/^          //' > /tmp/publish.sh
          sed -i '/^git config user.name github-actions\[bot\]$/,$d' /tmp/publish.sh
          bash /tmp/publish.sh

          git checkout HEAD -- .github/workflows
          rm -f publication.log

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: scope Stitch to ordered repository execution"
          git push origin HEAD:refactor/scoped-stitch-maintenance
